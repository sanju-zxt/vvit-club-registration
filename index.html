<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>VVIT · Elite Club Registration 2026</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary: #00f2fe;
      --secondary: #4facfe;
      --accent: #fa709a;
      --gold: #f5af19;
      --dark: #0a0e27;
      --darker: #060918;
      --card-bg: rgba(16, 21, 42, 0.92);
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(0, 242, 254, 0.35);
      --text: #e8edf5;
      --muted: #8892b0;
      --success: #00e676;
      --error: #ff1744;
      --warning: #ff9100;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--darker);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated mesh background */
    .mesh-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 20% 50%, rgba(0, 242, 254, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(79, 172, 254, 0.14) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(250, 112, 154, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(245, 175, 25, 0.10) 0%, transparent 50%);
      animation: meshMove 20s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes meshMove {
      0%, 100% { transform: scale(1) rotate(0deg); }
      33% { transform: scale(1.1) rotate(1deg); }
      66% { transform: scale(0.95) rotate(-1deg); }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      animation: orbFloat 15s ease-in-out infinite;
    }

    .orb-1 { width: 350px; height: 350px; background: rgba(0, 242, 254, 0.35); top: -80px; right: -80px; }
    .orb-2 { width: 250px; height: 250px; background: rgba(250, 112, 154, 0.35); bottom: -80px; left: -80px; animation-delay: 7s; }
    .orb-3 { width: 180px; height: 180px; background: rgba(79, 172, 254, 0.35); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 3s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(40px, -40px) scale(1.2); }
      50% { transform: translate(-20px, -60px) scale(0.9); }
      75% { transform: translate(-50px, 20px) scale(1.1); }
    }

    /* Particles */
    .particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .particle {
      position: absolute; width: 2px; height: 2px;
      background: var(--primary); border-radius: 50%;
      animation: float 6s infinite; opacity: 0.3;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-20px) scale(1.8); opacity: 0.7; }
    }

    /* Main container */
    .main-container {
      position: relative; z-index: 1;
      max-width: 850px; width: 100%;
    }

    /* Header */
    .header {
      text-align: center; margin-bottom: 1.8rem;
    }
    .institute-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: 2px;
      animation: glowText 3s ease-in-out infinite;
    }
    @keyframes glowText {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(0,242,254,0.5)); }
      50% { filter: drop-shadow(0 0 18px rgba(250,112,154,0.5)); }
    }
    .tagline {
      font-family: 'Rajdhani', sans-serif; color: var(--muted);
      letter-spacing: 4px; font-size: 0.9rem; margin-top: 0.4rem;
      text-transform: uppercase;
    }

    /* Premium Glass Card */
    .glass-card {
      background: var(--card-bg); backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border); border-radius: 2.2rem;
      padding: clamp(1.5rem, 4vw, 2.8rem);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,242,254,0.1), inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative; overflow: hidden;
    }
    .glass-card::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 200%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      animation: shimmer 8s infinite; pointer-events: none;
    }
    @keyframes shimmer {
      0% { left: -100%; } 100% { left: 100%; }
    }

    /* Steps */
    .steps {
      display: flex; justify-content: space-between;
      margin-bottom: 2.5rem; position: relative; z-index: 1;
      gap: 0.5rem;
    }
    .step-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.6rem; flex: 1;
    }
    .step-circle {
      width: clamp(38px, 6vw, 48px); height: clamp(38px, 6vw, 48px);
      border-radius: 50%; background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1rem, 2vw, 1.2rem); font-weight: 700;
      transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .step-item.active .step-circle {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-color: var(--primary); box-shadow: 0 0 25px rgba(0,242,254,0.5);
      animation: pulse 2s infinite;
    }
    .step-item.completed .step-circle {
      background: var(--success); border-color: var(--success);
    }
    @keyframes pulse {
      0%,100%{box-shadow:0 0 25px rgba(0,242,254,0.5);}
      50%{box-shadow:0 0 45px rgba(0,242,254,0.8);}
    }
    .step-label {
      font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
      font-weight: 600; letter-spacing: 1px; text-align: center;
    }

    /* Form sections */
    .form-section {
      display: none; animation: slideIn 0.6s cubic-bezier(0.4,0,0.2,1);
      position: relative; z-index: 1;
    }
    .form-section.active { display: block; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(25px); filter: blur(8px); }
      to { opacity: 1; transform: translateX(0); filter: blur(0); }
    }
    .section-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(1.5rem, 3vw, 2rem); font-weight: 600;
      color: var(--text); margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.7rem;
    }
    .section-title i { color: var(--primary); }

    /* Inputs */
    .input-group { margin-bottom: 1.4rem; }
    .input-label {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; font-weight: 600; color: var(--muted);
      margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 1px;
    }
    .input-label i { color: var(--primary); width: 16px; }
    .input-field {
      width: 100%; background: rgba(255,255,255,0.03);
      border: 2px solid rgba(255,255,255,0.12); border-radius: 1rem;
      padding: 1rem 1.2rem; font-size: 1rem; color: var(--text);
      font-family: 'Space Grotesk', sans-serif; transition: all 0.3s ease;
      outline: none;
    }
    .input-field:focus {
      border-color: var(--primary); box-shadow: 0 0 25px rgba(0,242,254,0.15);
      background: rgba(255,255,255,0.05);
    }
    .input-field::placeholder { color: rgba(255,255,255,0.22); }

    /* Club cards */
    .clubs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(175px, 1fr));
      gap: 1rem; margin: 1.2rem 0;
    }
    @media (max-width: 480px) {
      .clubs-grid { grid-template-columns: 1fr 1fr; gap: 0.7rem; }
    }
    .club-card {
      background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.08);
      border-radius: 1.3rem; padding: 1.2rem; cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1); position: relative; overflow: hidden;
    }
    .club-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.25); }
    .club-card.selected {
      border-color: var(--primary); background: rgba(0,242,254,0.1);
    }
    .club-card.selected .check-badge { opacity: 1; transform: scale(1); }
    .check-badge {
      position: absolute; top: 10px; right: 10px;
      width: 26px; height: 26px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: #000; font-weight: bold; font-size: 0.8rem;
      opacity: 0; transform: scale(0); transition: all 0.3s ease; z-index: 2;
    }
    .club-emoji { font-size: 2rem; margin-bottom: 0.5rem; }
    .club-name {
      font-family: 'Rajdhani', sans-serif; font-size: 1.1rem;
      font-weight: 600; color: var(--text); margin-bottom: 0.2rem;
    }
    .club-desc { font-size: 0.73rem; color: var(--muted); line-height: 1.4; }

    .club-counter {
      text-align: right; color: var(--primary); font-size: 0.85rem;
      font-weight: 500; margin-bottom: 0.2rem;
    }

    /* Terms */
    .terms-group {
      display: flex; align-items: flex-start; gap: 0.7rem;
      margin: 1.5rem 0; background: rgba(255,255,255,0.03);
      padding: 1rem 1.2rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1);
    }
    .terms-group input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: var(--primary);
      margin-top: 3px; cursor: pointer; flex-shrink: 0;
    }
    .terms-group label { font-size: 0.85rem; color: var(--muted); cursor: pointer; line-height: 1.6; }
    .terms-group label strong { color: var(--text); }

    /* Buttons */
    .btn {
      padding: 0.9rem 1.8rem; border-radius: 1rem; font-weight: 600;
      font-size: 0.95rem; font-family: 'Rajdhani', sans-serif;
      text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer;
      transition: all 0.3s ease; border: none; outline: none;
      display: inline-flex; align-items: center; gap: 0.5rem; justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #000; font-weight: 700;
      box-shadow: 0 10px 30px rgba(0,242,254,0.3);
      width: 100%; font-size: 1rem;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,242,254,0.5);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline {
      background: transparent; border: 2px solid rgba(255,255,255,0.2);
      color: var(--text);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }
    .btn-group { display: flex; gap: 0.8rem; margin-top: 1.5rem; flex-wrap: wrap; }

    /* Admin Export */
    .admin-section {
      margin-top: 1.8rem; padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .admin-title {
      font-family: 'Rajdhani', sans-serif; color: var(--muted);
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 1rem; text-align: center;
    }
    .btn-export {
      background: linear-gradient(135deg, var(--gold), #f0932b);
      color: #000; font-weight: 700;
      box-shadow: 0 8px 25px rgba(245,175,25,0.3);
      width: 100%;
    }

    /* Alerts */
    .alert {
      padding: 0.9rem 1.1rem; border-radius: 1rem; margin: 0.8rem 0;
      display: flex; align-items: center; gap: 0.7rem;
      animation: slideDown 0.4s ease; font-weight: 500; font-size: 0.85rem;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .alert-success { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.3); color: var(--success); }
    .alert-error { background: rgba(255,23,68,0.1); border: 1px solid rgba(255,23,68,0.3); color: var(--error); }
    .alert-info { background: rgba(0,242,254,0.1); border: 1px solid rgba(0,242,254,0.3); color: var(--primary); }

    /* Spinner */
    .spinner {
      width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.3);
      border-top-color: #000; border-radius: 50%;
      animation: spin 0.8s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .spinner { display: inline-block; }

    /* Success Modal */
    .success-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .success-modal {
      background: var(--card-bg); border: 2px solid var(--success);
      border-radius: 2.2rem; padding: 2.5rem;
      max-width: 500px; width: 90%; text-align: center;
      animation: scaleIn 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--success), #00c853);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1.5rem;
      font-size: 2.5rem; color: white;
      animation: bounce 0.7s ease;
    }
    @keyframes bounce {
      0%,100%{transform:scale(1);} 50%{transform:scale(1.12);}
    }
    .reg-details {
      background: rgba(0,0,0,0.3); border-radius: 1.2rem;
      padding: 1.2rem; margin: 1.2rem 0; text-align: left;
    }
    .detail-row {
      display: flex; justify-content: space-between; padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap;
    }
    .detail-label { color: var(--muted); font-size: 0.8rem; }
    .detail-value { color: var(--text); font-weight: 600; font-size: 0.85rem; }

    /* Admin Modal */
    .admin-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
      display: none; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .admin-modal {
      background: var(--card-bg); border: 2px solid var(--gold);
      border-radius: 1.8rem; padding: 2rem;
      max-width: 400px; width: 90%; text-align: center;
      animation: scaleIn 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    @media (max-width: 600px) {
      .glass-card { padding: 1.3rem; border-radius: 1.8rem; }
      .steps { gap: 0.3rem; }
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="mesh-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="particles" id="particles"></div>

  <div class="main-container">
    <div class="header">
      <div class="institute-name">VIJAYA VITTALA INSTITUTE OF TECHNOLOGY</div>
      <div class="tagline">✦ Elite Club Registration 2026 ✦</div>
    </div>

    <div class="glass-card">
      <div class="steps">
        <div class="step-item active" id="step1">
          <div class="step-circle"><i class="fas fa-lock"></i></div>
          <div class="step-label">Access</div>
        </div>
        <div class="step-item" id="step2">
          <div class="step-circle"><i class="fas fa-user"></i></div>
          <div class="step-label">Profile</div>
        </div>
        <div class="step-item" id="step3">
          <div class="step-circle"><i class="fas fa-star"></i></div>
          <div class="step-label">Clubs</div>
        </div>
      </div>

      <form id="registrationForm">
        <div class="form-section active" id="section1">
          <div class="section-title"><i class="fas fa-shield-halved"></i> Secure Access</div>
          <div class="input-group">
            <label class="input-label"><i class="fas fa-key"></i> Institute Password</label>
            <input type="password" class="input-field" id="accessPassword" placeholder="Enter access password" autocomplete="off">
          </div>
          <div id="passwordMessage"></div>
          <button type="button" class="btn btn-primary" onclick="verifyAccess()">
            <i class="fas fa-arrow-right"></i> VERIFY & PROCEED
          </button>
        </div>

        <div class="form-section" id="section2">
          <div class="section-title"><i class="fas fa-id-card"></i> Student Profile</div>
          <div class="input-group">
            <label class="input-label"><i class="fas fa-envelope"></i> College Email Address</label>
            <input type="email" class="input-field" id="studentEmail" placeholder="your.name@vvit.edu.in">
          </div>
          <div class="input-group">
            <label class="input-label"><i class="fas fa-user-graduate"></i> Full Name</label>
            <input type="text" class="input-field" id="fullName" placeholder="Enter your complete name">
          </div>
          <div class="input-group">
            <label class="input-label"><i class="fas fa-building-columns"></i> Branch / Department</label>
            <input type="text" class="input-field" id="branchName" placeholder="e.g., Computer Science & Engineering">
          </div>
          <div class="btn-group">
            <button type="button" class="btn btn-outline" onclick="goToStep(1)"><i class="fas fa-arrow-left"></i> Back</button>
            <button type="button" class="btn btn-primary" onclick="validateProfile()">Continue <i class="fas fa-arrow-right"></i></button>
          </div>
        </div>

        <div class="form-section" id="section3">
          <div class="section-title"><i class="fas fa-users"></i> Choose Your Clubs</div>
          <div class="club-counter">Selected: <strong id="clubCount" style="color:var(--primary);">0</strong> / Minimum 2</div>
          <div class="clubs-grid" id="clubsGrid"></div>
          <div id="clubMessage"></div>

          <div class="terms-group">
            <input type="checkbox" id="termsCheckbox">
            <label for="termsCheckbox">
              I confirm that I am a <strong>VVIT student</strong> and agree to abide by all club rules and regulations.
            </label>
          </div>

          <div class="btn-group">
            <button type="button" class="btn btn-outline" onclick="goToStep(2)"><i class="fas fa-arrow-left"></i> Back</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span class="btn-text"><i class="fas fa-paper-plane"></i> COMPLETE REGISTRATION</span>
              <span class="spinner"></span>
            </button>
          </div>
        </div>
      </form>

      <!-- Admin Export Button -->
      <div class="admin-section">
        <div class="admin-title"><i class="fas fa-shield-alt"></i> Admin Only</div>
        <button class="btn btn-export" onclick="showAdminModal()">
          <i class="fas fa-download"></i> EXPORT REGISTRATIONS
        </button>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="success-overlay" id="successModal">
    <div class="success-modal">
      <div class="success-icon"><i class="fas fa-check"></i></div>
      <h2 style="color:var(--success);font-family:'Rajdhani',sans-serif;font-size:2rem;">Registration Successful!</h2>
      <p style="color:var(--muted);margin:0.8rem 0;">Confirmation email sent to your inbox</p>
      <div class="reg-details" id="regDetails"></div>
      <button class="btn btn-primary" onclick="closeSuccessModal()" style="margin-top:1rem;">
        <i class="fas fa-check-circle"></i> DONE
      </button>
    </div>
  </div>

  <!-- Admin Password Modal -->
  <div class="admin-overlay" id="adminModal">
    <div class="admin-modal">
      <h3 style="color:var(--gold);font-family:'Rajdhani',sans-serif;font-size:1.6rem;margin-bottom:1rem;">
        <i class="fas fa-lock"></i> Admin Verification
      </h3>
      <p style="color:var(--muted);font-size:0.85rem;margin-bottom:1rem;">Enter admin password to export data</p>
      <input type="password" class="input-field" id="adminPassword" placeholder="Admin password" style="margin-bottom:1rem;">
      <div id="adminMessage"></div>
      <div style="display:flex;gap:0.8rem;">
        <button class="btn btn-outline" onclick="closeAdminModal()" style="flex:1;">Cancel</button>
        <button class="btn btn-export" onclick="verifyAdmin()" style="flex:1;">Export CSV</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAGEbPjyGaNc_I88HcWuKt_NGrFfbkVcFk",
      authDomain: "vvit-club-registration.firebaseapp.com",
      projectId: "vvit-club-registration",
      storageBucket: "vvit-club-registration.firebasestorage.app",
      messagingSenderId: "5035896195",
      appId: "1:5035896195:web:42bde847766111f24d1ab6",
      measurementId: "G-X4P3LHGKCB"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    emailjs.init("3jggm3MsvGgZEWx0a");

    const CORRECT_PASSWORD = "VVIT@STUDENT";
    const ADMIN_PASSWORD = "VVIT@ADMIN05";

    const CLUBS = [
      { id: 'technoverse', name: 'TechnoVerse', emoji: '💻', desc: 'Tech innovation • Hackathons • Coding' },
      { id: 'vvei', name: 'VVEI Media', emoji: '🎬', desc: 'Vijaya Vittala Entertainments • Film & Media' },
      { id: 'roundtable', name: 'The VVIT RoundTable', emoji: '🎤', desc: 'Debate • MUNs • Public speaking' },
      { id: 'vonfloor', name: "V'onFLOOR", emoji: '💃', desc: 'Cultural fest • Dance • Music • Drama' }
    ];

    let currentStep = 1;
    let userData = {};
    let registeredEmails = new Set();

    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
      renderClubs();
      loadRegisteredEmails();
    });

    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 35; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 6 + 's';
        p.style.animationDuration = (Math.random() * 6 + 3) + 's';
        container.appendChild(p);
      }
    }

    function renderClubs() {
      document.getElementById('clubsGrid').innerHTML = CLUBS.map(c => `
        <div class="club-card" data-id="${c.id}" onclick="toggleClub('${c.id}')">
          <div class="check-badge">✓</div>
          <div class="club-emoji">${c.emoji}</div>
          <div class="club-name">${c.name}</div>
          <div class="club-desc">${c.desc}</div>
        </div>
      `).join('');
    }

    function toggleClub(id) {
      document.querySelector(`[data-id="${id}"]`).classList.toggle('selected');
      document.getElementById('clubCount').textContent = document.querySelectorAll('.club-card.selected').length;
      document.getElementById('clubMessage').innerHTML = '';
    }

    function getSelectedClubs() {
      return Array.from(document.querySelectorAll('.club-card.selected')).map(c => c.dataset.id);
    }

    async function loadRegisteredEmails() {
      try {
        const snap = await db.collection('registrations').get();
        snap.forEach(doc => { const d = doc.data(); if (d.email) registeredEmails.add(d.email.toLowerCase()); });
      } catch (e) {
        const local = JSON.parse(localStorage.getItem('vvit_registrations') || '[]');
        local.forEach(r => { if (r.email) registeredEmails.add(r.email.toLowerCase()); });
      }
    }

    function isEmailRegistered(email) { return registeredEmails.has(email.toLowerCase()); }

    function goToStep(step) {
      document.getElementById(`section${currentStep}`).classList.remove('active');
      document.getElementById(`step${currentStep}`).classList.remove('active');
      currentStep = step;
      document.getElementById(`section${step}`).classList.add('active');
      document.getElementById(`step${step}`).classList.add('active');
      for (let i = 1; i < step; i++) document.getElementById(`step${i}`).classList.add('completed');
    }

    function verifyAccess() {
      const pw = document.getElementById('accessPassword').value;
      const msg = document.getElementById('passwordMessage');
      if (pw === CORRECT_PASSWORD) {
        msg.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Access granted!</div>';
        setTimeout(() => goToStep(2), 500);
      } else if (pw.length > 0) {
        msg.innerHTML = '<div class="alert alert-error"><i class="fas fa-times-circle"></i> Incorrect password.</div>';
      }
    }

    function validateProfile() {
      const email = document.getElementById('studentEmail').value.trim();
      const name = document.getElementById('fullName').value.trim();
      const branch = document.getElementById('branchName').value.trim();
      if (!email || !name || !branch) return alert('Please fill all fields.');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return alert('Enter a valid email.');
      if (isEmailRegistered(email)) return alert('This email is already registered.');
      userData = { email, name, branch };
      goToStep(3);
    }

    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const selected = getSelectedClubs();
      const terms = document.getElementById('termsCheckbox').checked;
      if (selected.length < 2) return document.getElementById('clubMessage').innerHTML = '<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> Select at least 2 clubs.</div>';
      if (!terms) return document.getElementById('clubMessage').innerHTML = '<div class="alert alert-error"><i class="fas fa-exclamation-triangle"></i> Accept terms to continue.</div>';

      const clubNames = selected.map(id => CLUBS.find(c => c.id === id)?.name || id);
      const regData = { ...userData, clubs: clubNames, clubIds: selected, timestamp: new Date().toISOString(), registrationId: 'VVIT-' + Date.now().toString(36).toUpperCase(), acceptedTerms: true };
      const btn = document.getElementById('submitBtn');
      btn.classList.add('loading');
      document.getElementById('submitBtn').disabled = true;

      try {
        await db.collection('registrations').add(regData);
        registeredEmails.add(userData.email.toLowerCase());
        const local = JSON.parse(localStorage.getItem('vvit_registrations') || '[]');
        local.push(regData);
        localStorage.setItem('vvit_registrations', JSON.stringify(local));
        await emailjs.send('service_017nmv2', 'template_fkfp5ns', { to_email: regData.email, to_name: regData.name, registration_id: regData.registrationId, branch: regData.branch, clubs: regData.clubs.join(', '), reply_to: regData.email });
        showSuccessModal(regData);
        resetForm();
      } catch (err) { console.error(err); alert('Registration failed.'); }
      finally { btn.classList.remove('loading'); document.getElementById('submitBtn').disabled = false; }
    });

    function showSuccessModal(data) {
      document.getElementById('regDetails').innerHTML = `
        <div class="detail-row"><span class="detail-label">Registration ID</span><span class="detail-value">${data.registrationId}</span></div>
        <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${data.name}</span></div>
        <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${data.email}</span></div>
        <div class="detail-row"><span class="detail-label">Branch</span><span class="detail-value">${data.branch}</span></div>
        <div class="detail-row"><span class="detail-label">Clubs</span><span class="detail-value">${data.clubs.join(', ')}</span></div>
      `;
      document.getElementById('successModal').style.display = 'flex';
    }

    function closeSuccessModal() { document.getElementById('successModal').style.display = 'none'; }

    function resetForm() {
      document.getElementById('studentEmail').value = '';
      document.getElementById('fullName').value = '';
      document.getElementById('branchName').value = '';
      document.querySelectorAll('.club-card').forEach(c => c.classList.remove('selected'));
      document.getElementById('clubCount').textContent = '0';
      document.getElementById('termsCheckbox').checked = false;
      userData = {};
      goToStep(1);
    }

    // Admin Export
    function showAdminModal() {
      document.getElementById('adminModal').style.display = 'flex';
      document.getElementById('adminPassword').value = '';
      document.getElementById('adminMessage').innerHTML = '';
    }

    function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

    async function verifyAdmin() {
      const pw = document.getElementById('adminPassword').value;
      if (pw === ADMIN_PASSWORD) {
        await exportCSV();
        closeAdminModal();
      } else {
        document.getElementById('adminMessage').innerHTML = '<div class="alert alert-error"><i class="fas fa-times-circle"></i> Wrong admin password!</div>';
      }
    }

    async function exportCSV() {
      let registrations = [];
      try {
        const snap = await db.collection('registrations').orderBy('timestamp', 'desc').get();
        snap.forEach(doc => registrations.push(doc.data()));
      } catch (e) {
        registrations = JSON.parse(localStorage.getItem('vvit_registrations') || '[]');
      }
      const unique = Array.from(new Map(registrations.map(r => [r.registrationId, r])).values());
      const csv = [['Registration ID','Name','Email','Branch','Clubs','Timestamp'], ...unique.map(r => [r.registrationId, r.name, r.email, r.branch, (r.clubs||[]).join('; '), r.timestamp])].map(row => row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `VVIT_Registrations_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      alert(`✅ Exported ${unique.length} registrations!`);
    }
  </script>
</body>
</html>
